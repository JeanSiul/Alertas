<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlertManager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">AM</div>
        <div>
          <div class="logo-title">AlertManager</div>
          <div class="logo-sub">Sistema de alertas</div>
        </div>
      </div>

      <nav class="nav">
        <span class="nav-section">Principal</span>
        <a class="nav-item active" data-section="dashboard">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
          Dashboard
        </a>

        <span class="nav-section">Configuración</span>
        <a class="nav-item" data-section="canales">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8c0-3.3 2.7-6 6-6s6 2.7 6 6-2.7 6-6 6"/><path d="M8 5v3l2 2"/><path d="M1 11l3-3"/></svg>
          Canales
        </a>
        <a class="nav-item" data-section="destinatarios">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-2.8 2.2-5 5-5h2"/><circle cx="13" cy="12" r="2.5"/><path d="M13 10v2l1 1"/></svg>
          Destinatarios
        </a>
        <a class="nav-item" data-section="procesos">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="3" rx="1"/><rect x="2" y="6.5" width="8" height="3" rx="1"/><rect x="2" y="11" width="5" height="3" rx="1"/></svg>
          Procesos
        </a>
        <a class="nav-item" data-section="asignaciones">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="3" cy="8" r="2"/><circle cx="13" cy="4" r="2"/><circle cx="13" cy="12" r="2"/><path d="M5 8h3l3-4M5 8h3l3 4"/></svg>
          Asignaciones
        </a>

        <span class="nav-section">Monitoreo</span>
        <a class="nav-item" data-section="cola">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l2.5 2.5"/></svg>
          Cola de envíos
        </a>
        <a class="nav-item" data-section="configuracion">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>
          API / n8n
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span id="conn-status">Sin conectar</span>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <header class="topbar">
        <h1 id="page-title">Dashboard</h1>
        <div class="topbar-right">
          <div id="topbar-actions"></div>
          <button class="btn-icon" onclick="App.refresh()" title="Refrescar">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c2 0 3.7.9 4.9 2.3"/><path d="M14 2v3h-3"/></svg>
          </button>
        </div>
      </header>

      <main class="content" id="content">
        <!-- rendered by JS -->
      </main>
    </div>
  </div>

  <!-- MODALS -->
  <div id="modal-overlay" class="modal-overlay" onclick="Modal.closeOnOverlay(event)">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="btn-icon" onclick="Modal.close()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 2l12 12M14 2L2 14"/></svg>
        </button>
      </div>
      <div id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
        <button class="btn btn-primary" id="modal-save">Guardar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
